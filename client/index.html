<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .chat-container {
      width: 400px;
      height: 600px;
      background: #16213e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .header {
      background: #0f3460;
      padding: 16px 20px;
      color: #e94560;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header::before {
      content: '●';
      color: #00d9ff;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.4;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.own {
      align-self: flex-end;
      background: #e94560;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.other {
      align-self: flex-start;
      background: #0f3460;
      color: #eaeaea;
      border-bottom-left-radius: 4px;
    }
    .message .meta {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 4px;
      display: flex;
      gap: 8px;
    }
    .input-area {
      display: flex;
      padding: 12px 16px;
      gap: 10px;
      background: #0f3460;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 20px;
      background: #16213e;
      color: white;
      font-size: 14px;
      outline: none;
    }
    input::placeholder { color: #888; }
    button {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #e94560;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.1); }
    .name-input {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .name-box {
      background: #16213e;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
    }
    .name-box h2 { color: #e94560; margin-bottom: 16px; }
    .name-box input { width: 250px; margin-bottom: 16px; text-align: center; }
    .name-box button { width: auto; padding: 10px 30px; border-radius: 20px; }
  </style>
</head>
<body>
  <!-- Ввод имени -->
  <div class="name-input" id="nameModal">
    <div class="name-box">
      <h2>👋 Как тебя зовут?</h2>
      <input type="text" id="nameInput" placeholder="Введи имя..." maxlength="20">
      <br>
      <button onclick="joinChat()">Войти</button>
    </div>
  </div>

  <!-- Чат -->
  <div class="chat-container">
    <div class="header">💬 Mini Chat</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Напиши сообщение..." maxlength="500">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    let username;
    let mySocketId;

    function joinChat() {
      const input = document.getElementById('nameInput');
      username = input.value.trim() || 'Аноним';
      document.getElementById('nameModal').style.display = 'none';
      
      // Подключаемся к серверу
      socket = io();
      mySocketId = socket.id;

      socket.on('connect', () => {
        mySocketId = socket.id;
      });

      // Получаем сообщения
      socket.on('chat message', (data) => {
        addMessage(data);
      });

      // Отправка по Enter
      document.getElementById('msgInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
      document.getElementById('msgInput').focus();
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;

      socket.emit('chat message', { text, user: username });
      input.value = '';
    }

    function addMessage(data) {
      const container = document.getElementById('messages');
      const isOwn = data.user === username;
      
      const div = document.createElement('div');
      div.className = `message ${isOwn ? 'own' : 'other'}`;
      div.innerHTML = `
        <div class="meta">
          <span>${data.user}</span>
          <span>${data.time}</span>
        </div>
        <div>${escapeHtml(data.text)}</div>
      `;
      
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
